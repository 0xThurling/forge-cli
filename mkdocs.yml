site_name: Forge CLI (C++ Meta-Build System)
theme:
  name: readthedocs
  highlightjs: true
nav:
  - home: index.md
  - prerequisites: prerequisites.md
  - build_system: build-system.md
  - project_scaffolding: project-scaffolding.md
  - dependency_management: dependency-management.md
  - cli_reference: cli-reference.md
  - lua_reference: lua-reference.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx
markdown_extensions:
  - markdown_include.include:
      base_path: .
  - admonition
